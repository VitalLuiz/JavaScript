<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style2.css">
    <script>
        function iniciarjogo(){    
            var nivel = document.getElementById('nivel').value
            if(nivel === ''){
                alert('Selecione um nivel')
                return false
            }
            window.location.href = 'index.html?' + nivel
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <img src="imagens/game.png" alt="GO">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <div class="mb-2">
                        <select class="form-control" id="nivel">
                            <option value="">Selecione o Nível</option>
                            <option value="normal">Normal</option>
                            <option value="dificil">Díficil</option>
                            <option value="chuk">Chuk Norries</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div class="d-flex justify-content-center">
                    <button id="butao" type="button" class="btn btn-danger btn-lg" onclick="iniciarjogo()">Iniciar Jogo</button>
                </div>
            </div>
        </div> 
    </div>
    <script>
        document.getElementById('butao').onclick = window.location.href = 'index.html'
    </script>
</body>
</html>
