<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>

    <input onkeyup="valores()" onblur="cordefundo('#fff')" onfocus="cordefundo('#ffff00')" type="text" id="unico">

    <script>
        function cordefundo(cor_de_fundo){
            document.getElementById('unico').style.background = cor_de_fundo;
        }
        function valores(){
            let caracteres = document.getElementById('unico').value.length
            if(caracteres < 3 ){
                document.getElementById('unico').style.background = "#ff0000"
            }else{
                document.getElementById('unico').style.background = "#008000"
            }
        }
    </script>
</body>
</html>
