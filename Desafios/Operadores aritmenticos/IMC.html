<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var nome = prompt("Qual seu nome: ");
        var altura = parseInt(prompt("Digite sua altura em centimetros: "));
        var peso = parseFloat(prompt("Digite seu peso em quilos: "));
        var classificacao = null;
        var imc = null;

        altura /= 100;
        imc = peso / (altura ** 2);

        if(imc < 16){
            classificacao = "Baixo peso muito grave"
        }else if(imc >= 16 && imc < 17){
            classificacao = "Baixo peso grave"
        }else if(imc >= 17 && imc < 18.5){
            classificacao = "Baixo peso"
        }else if(imc >= 18.5 && imc < 25){
            classificacao = "Peso normal"
        }else if(imc > 25 && imc < 30){
            classificacao = "Sobrepeso"
        }else if(imc > 30 && imc < 35){
            classificacao = "Obesidade grau 1"
        }else if(imc > 35 && imc < 40){
            classificacao = "Obesidade grau 2"
        }else if(imc > 40){
            classificacao = "Obesidade grau 3"
        }else{
            classificacao = "Valor digitado não é aceito"
        }
        document.write(nome + " possui ìndicie de massa corporal igual a " + imc + ", sendo classificado como: " + classificacao);
    </script>
</head>
<body>
    
</body>
</html>
