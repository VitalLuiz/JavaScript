<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>
<body>
    <script>
        var x = 1
        var y = 1

        while(y <= 10){
            while(x <= 10){
                document.write(x + ' X ' + y + ' = ' + x*y + '<br>')
                x++
            }
            x = 1
            document.write('<hr>')
            y++
        }
    </script>
</body>
</html>
