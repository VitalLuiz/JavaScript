<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .estilo1{
            background: #ff0000;
            color: #FFF;
        }
        .estilo2{
            width: 400px;
            height: 50px;
            background: #FF0000;
            padding: 25px;
        }
    </style>
</head>
<body>
    <div id="mensagem" class="estilo1"> Modificando a classe do elemento</div>
    <hr>
    <button onclick="modificaclasse()" type="button">Carregar classe</button>
    <script>
        function modificaclasse(){
            document.getElementById('mensagem').className = estilo2;
        }
    </script>
</body>
</html>
