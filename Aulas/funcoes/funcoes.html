<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var largura = parseInt(prompt("Digite o valor da largura: "))
        var comprimento  = parseInt(prompt("Digite o valor do comprimento: "))
            

        function CalcularAreaTerreno(largura, comprimento){
            //logica
            var area = largura * comprimento
            return area
        }

        document.write("O terreno possui: " + CalcularAreaTerreno(largura, comprimento) + " metros quadrados")
    </script>
</head>
